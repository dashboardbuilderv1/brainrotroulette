<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainrot Roulette</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center p-4">

    <main class="w-full max-w-md bg-slate-900 rounded-3xl p-6 shadow-2xl space-y-6">
        <h1 class="text-xl font-black text-center text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">BRAINROT GENERATOR</h1>
        
        <div id="dropzone" class="relative border-2 border-dashed border-slate-700 rounded-2xl p-10 text-center cursor-pointer bg-slate-950/50">
            <input type="file" id="fileInput" accept="image/png, image/jpeg" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
            <p id="uploadText" class="text-sm">Tik hier voor je Brainrot edit</p>
        </div>

        <canvas id="canvas" class="hidden w-full rounded-xl border border-slate-700"></canvas>
        <p id="roastText" class="hidden text-center text-sm italic text-pink-400 font-bold p-4 bg-slate-800 rounded-xl"></p>

        <button id="btn" class="hidden w-full py-4 bg-gradient-to-r from-green-500 to-emerald-600 rounded-xl font-bold uppercase shadow-lg">Download Resultaat!</button>
    </main>

    <script>
        const fileInput = document.getElementById('fileInput');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('btn');
        const roastText = document.getElementById('roastText');

        // Lijst met 100% werkende Brainrot-roasts
        const roasts = [
            "Bro is NOT hitting the griddy! 💀",
            "Absolute cinema! Deze fit is mid.",
            "POV: Je bent een Fortnite NPC.",
            "Strawberry Elephant zou dit winnen.",
            "Don Tictacco keurt je outfit af.",
            "L + ratio + geen builds + je bent een bot.",
            "Deze foto heeft te veel aura... of juist niet.",
            "Je bent officieel een Brainrot-level 100 Boss!"
        ];

        // Zorg dat je deze 4 bestanden (of vergelijkbare .png's) in je GitHub repo hebt!
        const stickers = ["elephant.png", "tictac.png", "cinema.png", "controller.png"];

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    
                    const sticker = new Image();
                    sticker.src = stickers[Math.floor(Math.random() * stickers.length)];
                    sticker.onload = () => {
                        const size = canvas.width * 0.5;
                        ctx.drawImage(sticker, (canvas.width - size) / 2, (canvas.height - size) / 2, size, size);
                        canvas.classList.remove('hidden');
                        btn.classList.remove('hidden');
                        
                        // Toon willekeurige roast
                        roastText.innerText = roasts[Math.floor(Math.random() * roasts.length)];
                        roastText.classList.remove('hidden');
                    };
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        btn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'brainrot-me.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    </script>
</body>
</html>
