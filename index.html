<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruits vs Brainrots: AI Roulette</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 antialiased selection:bg-purple-500">

    <main class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-2xl space-y-6">
        
        <!-- Header -->
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-black tracking-wider uppercase bg-gradient-to-r from-purple-400 via-pink-500 to-amber-400 bg-clip-text text-transparent">
                Brainrot Roulette
            </h1>
            <p class="text-xs text-slate-400 uppercase tracking-widest font-semibold">Fortnite Fruits vs Brainrots Edition</p>
        </div>

        <hr class="border-slate-800">

        <!-- Upload Zone -->
        <div id="dropzone" class="border-2 border-dashed border-slate-700 hover:border-purple-500 rounded-2xl p-8 text-center cursor-pointer transition-all duration-200 bg-slate-950/50">
            <input type="file" id="fileInput" accept="image/jpeg, image/png" class="hidden">
            <div id="uploadPrompt" class="space-y-2">
                <p class="text-sm font-medium text-slate-300">Sleep je selfie hiernaartoe of <span class="text-purple-400 underline">klik om te zoeken</span></p>
                <p class="text-xs text-slate-500">Alleen JPEG of PNG (Max. 5MB)</p>
            </div>
            <p id="fileSelectedText" class="text-sm font-bold text-green-400 hidden">✓ Foto geselecteerd!</p>
        </div>

        <!-- Start Knop -->
        <button id="mutateBtn" disabled class="w-full py-4 bg-slate-800 text-slate-500 font-bold rounded-xl cursor-not-allowed transition-all duration-200 uppercase tracking-wider shadow-lg">
            Upload eerst een foto
        </button>

        <!-- Loading State (Roulette Animatie) -->
        <div id="loadingState" class="hidden text-center p-6 bg-slate-950 rounded-2xl border border-slate-800 animate-pulse space-y-3">
            <p class="text-xs uppercase tracking-widest text-slate-500 font-bold">Karakter selecteren...</p>
            <div id="rouletteTicker" class="text-xl font-black uppercase text-purple-400">---</div>
            <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                <div class="bg-gradient-to-r from-purple-500 to-pink-500 h-full w-1/2 animate-[shimmer_1.5s_infinite] rounded-full"></div>
            </div>
        </div>

        <!-- Resultaat Sectie -->
        <div id="resultState" class="hidden space-y-4 text-center">
            <div class="p-4 bg-slate-950 rounded-2xl border border-slate-800 space-y-1">
                <p class="text-xs uppercase tracking-widest text-slate-400 font-semibold">Jouw Brainrot Karakter:</p>
                <h2 id="resultName" class="text-2xl font-black uppercase tracking-wide">---</h2>
                <span id="resultRarity" class="inline-block text-[10px] font-bold uppercase tracking-widest px-2 py-0.5 rounded-full text-white">---</span>
            </div>
            <div class="overflow-hidden rounded-2xl border border-slate-800 bg-slate-950 aspect-square">
                <img id="resultImg" src="" alt="Brainrot Resultaat" class="w-full h-full object-cover">
            </div>
            <a id="downloadBtn" download="my-brainrot.png" href="#" class="block w-full py-3.5 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-bold rounded-xl text-center shadow-md uppercase tracking-wider text-sm transition-all">
                Download Afbeelding
            </a>
            <button onclick="window.location.reload()" class="text-xs text-slate-500 hover:text-slate-400 underline font-medium">
                Probeer Nogmaals
            </button>
        </div>

    </main>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const mutateBtn = document.getElementById('mutateBtn');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const fileSelectedText = document.getElementById('fileSelectedText');
        const loadingState = document.getElementById('loadingState');
        const rouletteTicker = document.getElementById('rouletteTicker');
        const resultState = document.getElementById('resultState');
        const resultName = document.getElementById('resultName');
        const resultRarity = document.getElementById('resultRarity');
        const resultImg = document.getElementById('resultImg');
        const downloadBtn = document.getElementById('downloadBtn');

        let selectedFile = null;

        const BRAINROT_POOL = [
            { name: "Strawberry Elephant", rarity: "MYTHIC (5%)", color: "#3b82f6", weight: 5 },
            { name: "Don Tictacco", rarity: "EPIC (15%)", color: "#a855f7", weight: 15 },
            { name: "Absolute Cinema", rarity: "RARE (30%)", color: "#eab308", weight: 30 },
            { name: "Controllerino", rarity: "COMMON (50%)", color: "#22c55e", weight: 50 }
        ];

        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('border-purple-500', 'bg-purple-950/10'); });
        dropzone.addEventListener('dragleave', () => { dropzone.classList.remove('border-purple-500', 'bg-purple-950/10'); });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('border-purple-500', 'bg-purple-950/10');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => { if (e.target.files.length > 0) handleFile(e.target.files[0]); });

        function handleFile(file) {
            selectedFile = file;
            uploadPrompt.classList.add('hidden');
            fileSelectedText.classList.remove('hidden');
            dropzone.classList.add('border-green-500/50', 'bg-green-950/5');
            mutateBtn.disabled = false;
            mutateBtn.innerText = "Rot My Face! 🎲";
            mutateBtn.className = "w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold rounded-xl cursor-pointer transition-all duration-200 uppercase tracking-wider shadow-lg hover:scale-[1.01]";
        }

        function getRandomBrainrot() {
            let totalWeight = BRAINROT_POOL.reduce((sum, item) => sum + item.weight, 0);
            let randomNum = Math.random() * totalWeight;
            for (let i = 0; i < BRAINROT_POOL.length; i++) {
                if (randomNum < BRAINROT_POOL[i].weight) return BRAINROT_POOL[i];
                randomNum -= BRAINROT_POOL[i].weight;
            }
            return BRAINROT_POOL[BRAINROT_POOL.length - 1];
        }

        mutateBtn.addEventListener('click', () => {
            if (!selectedFile) return;

            dropzone.classList.add('hidden');
            mutateBtn.classList.add('hidden');
            loadingState.classList.remove('hidden');

            let tickerInterval = setInterval(() => {
                rouletteTicker.innerText = BRAINROT_POOL[Math.floor(Math.random() * BRAINROT_POOL.length)].name;
            }, 80);

            setTimeout(() => {
                clearInterval(tickerInterval);
                loadingState.classList.add('hidden');

                const rolled = getRandomBrainrot();
                
                resultName.innerText = rolled.name;
                resultName.style.color = rolled.color;
                resultRarity.innerText = rolled.rarity;
                resultRarity.style.backgroundColor = rolled.color;
                
                const mockImgUrl = `https://picsum.photos/seed/${Math.floor(Math.random() * 1000)}/500/500`;
                resultImg.src = mockImgUrl;
                downloadBtn.href = mockImgUrl;

                resultState.classList.remove('hidden');
            }, 2500);
        });
    </script>
</body>
</html>
