<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainrot Roulette & Gemini Roast</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center p-4">

    <main class="w-full max-w-md bg-slate-900 rounded-3xl p-6 shadow-2xl space-y-6">
        <h1 class="text-xl font-black text-center text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">BRAINROT AI ROAST</h1>
        
        <div id="dropzone" class="relative border-2 border-dashed border-slate-700 rounded-2xl p-10 text-center cursor-pointer bg-slate-950/50">
            <input type="file" id="fileInput" accept="image/png, image/jpeg" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
            <p id="uploadText" class="text-sm">Tik hier voor je Brainrot roast</p>
        </div>

        <canvas id="canvas" class="hidden w-full rounded-xl border border-slate-700"></canvas>
        <p id="roastText" class="hidden text-center text-sm italic text-pink-400 font-bold"></p>

        <button id="btn" class="hidden w-full py-4 bg-gradient-to-r from-green-500 to-emerald-600 rounded-xl font-bold uppercase shadow-lg">Download!</button>
    </main>

    <script>
        const GEMINI_KEY = "AIzaSyA1iidJcZ1kZYkoZwQvpPTtgC2KtYsiy_E";
        const fileInput = document.getElementById('fileInput');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('btn');
        const roastText = document.getElementById('roastText');

        // Zorg dat je deze 4 bestanden in je GitHub map hebt staan!
        const stickers = ["elephant.png", "tictac.png", "cinema.png", "controller.png"];

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = async (event) => {
                const base64 = event.target.result;
                const img = new Image();
                img.onload = async () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    
                    const sticker = new Image();
                    sticker.src = stickers[Math.floor(Math.random() * stickers.length)];
                    sticker.onload = () => {
                        const size = canvas.width * 0.5;
                        ctx.drawImage(sticker, (canvas.width - size) / 2, (canvas.height - size) / 2, size, size);
                        canvas.classList.remove('hidden');
                        btn.classList.remove('hidden');
                    };

                    // Gemini Roast aanroep
                    roastText.innerText = "Gemini is aan het roasten...";
                    roastText.classList.remove('hidden');
                    const roast = await getRoast(base64);
                    roastText.innerText = roast;
                };
                img.src = base64;
            };
            reader.readAsDataURL(file);
        });

        async function getRoast(base64Image) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Je bent een Fortnite brainrot-expert. Geef een super korte, absurde en grappige 'roast' over deze persoon in de stijl van Fortnite-memes (max 10 woorden)." },
                                { inline_data: { mime_type: "image/jpeg", data: base64Image.split(',')[1] } }
                            ]
                        }]
                    })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) { return "Teveel brainrot voor vandaag, roast mislukt!"; }
        }

        btn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'brainrot-me.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    </script>
</body>
</html>
